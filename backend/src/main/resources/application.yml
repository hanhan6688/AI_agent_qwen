spring:
  application:
    name: docextract-backend

  profiles:
    active: dev

  # 数据源配置
  datasource:
    url: jdbc:postgresql://localhost:5432/docextract
    username: admin
    password: password123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: redis123
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
    timeout: 5000ms

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

# 应用配置
app:
  # 文件存储路径
  storage:
    upload-path: data/uploads
    processed-path: data/processed
    excel-path: data/excel

  # 任务队列配置
  queue:
    pending: task:pending
    processing: task:processing

# 日志配置
logging:
  level:
    root: INFO
    com.docextract: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: logs/app.log
